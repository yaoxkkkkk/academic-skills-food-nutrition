figures:
  - figure: 1
    file_stem: figures/fig1_active_packaging
    data_source: data/active_packaging_material.csv; data/active_packaging_storage.csv; data/active_packaging_dose_response.csv; all synthetic/illustrative
    transformation: render_gallery.R; replicate summaries, endpoint kernel densities, smoothing spline, correlation matrix, standardised PCA, and illustrative integrated scores
    panel_map:
      a: Code-drawn film-to-food experimental schematic; no quantitative evidence.
      b-c: Synthetic film mechanics and water-vapour permeability.
      d-g: Synthetic chilled-storage kinetics and endpoint distributions.
      h: Synthetic extract dose response with descriptive smooth.
      i-j: Correlation matrix and PCA of standardised quality outcomes.
      k: Illustrative integrated package-performance profile.
    statistics_shown: Means +/- SD for material and storage summaries; raw synthetic endpoint replicates; Pearson correlations; PCA scores.
    supported_claims:
      - text: Layout example only; no manuscript claim is supported.
        locator: Gallery README
    limitations: [Synthetic data, no inferential testing, unvalidated dose-response smooth, illustrative integrated scores]

  - figure: 2
    file_stem: figures/fig2_probiotic_storage_kinetics
    data_source: data/probiotic_storage_kinetics.csv; data/probiotic_challenge_survival.csv; data/probiotic_encapsulation_properties.csv; all synthetic/illustrative
    transformation: render_gallery.R; batch and replicate summaries, illustrative linear model, endpoint kernel densities, batch decay-rate fits, scenario matrix, and integrated scores
    panel_map:
      a: Code-drawn formulation-to-performance schematic; no quantitative evidence.
      b-e: Synthetic storage kinetics, residuals, and endpoint distributions.
      f-g: Synthetic acid- and bile-challenge survival.
      h-i: Illustrative encapsulation efficiency and batch-specific decay rates.
      j-k: Synthetic robustness matrix and illustrative integrated profile.
    statistics_shown: Means +/- SD; raw synthetic distributions; linear-model residuals; batch slopes with illustrative 95% intervals.
    supported_claims:
      - text: Layout example only; no manuscript claim is supported.
        locator: Gallery README
    limitations: [Synthetic data, illustrative threshold, simplified linear kinetics, no real strain or food matrix, illustrative integrated scores]

  - figure: 3
    file_stem: figures/fig3_sensory_radar
    data_source: data/sensory_panel_ratings.csv and data/sensory_overall_liking.csv; both synthetic/illustrative
    transformation: render_gallery.R; product means, kernel densities, standardised PCA, repeatability differences, one-way attribute models, and illustrative penalties and scores
    panel_map:
      a: Code-drawn blinded sensory-design schematic; no quantitative evidence.
      b-d: Synthetic attribute profiles and replicate distributions.
      e-f: PCA scores and loadings.
      g-h: Illustrative repeatability and product discrimination.
      i-j: Synthetic liking comparison and layout-only penalty analysis.
      k: Illustrative integrated sensory-study profile.
    statistics_shown: Synthetic means and raw scores; PCA; absolute repeat-session differences; one-way F statistics.
    supported_claims:
      - text: Layout example only; no manuscript claim is supported.
        locator: Gallery README
    limitations: [Synthetic panel, simplified models, heatmap shows eight of 24 illustrative panelists, penalty values are layout-only, illustrative integrated scores]

  - figure: 4
    file_stem: figures/fig4_method_validation_and_evidence
    data_source: data/method_paired_measurements.csv; data/method_calibration_standards.csv; data/method_reaction_profiles.csv; data/method_recovery_precision.csv; data/method_robustness_matrix.csv; all synthetic/illustrative
    transformation: render_gallery.R; calibration and comparison regressions, residuals, Bland-Altman bias and limits, recovery summaries, robustness matrix, waterfall contributions, and integrated scores
    panel_map:
      a: Code-drawn comparator-method validation schematic; no quantitative evidence.
      b-d: Synthetic raw response, paired distributions, and calibration.
      e-g: Method comparison, residual diagnostic, and Bland-Altman agreement.
      h-j: Synthetic recovery, operator precision, and robustness.
      k-l: Illustrative validation-component waterfall and integrated profile.
    statistics_shown: Linear fits and illustrative R-squared; residuals; mean bias and mean +/- 1.96 SD limits; recovery means +/- SD; raw operator distributions.
    supported_claims:
      - text: Layout example only; no analytical method claim is supported.
        locator: Gallery README
    limitations: [Synthetic data, no preregistered acceptance criteria, simplified diagnostics, illustrative waterfall and integrated scores]
